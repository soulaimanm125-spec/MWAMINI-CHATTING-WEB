<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MWAMINI CHAT WEB - Gateway</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>

    <div class="auth-container">
        <div class="auth-card">
            <h1 class="brand-title">MWAMINI CHAT WEB</h1>
            <p style="font-size: 14px; color: #667781; margin-bottom: 20px;">Enter your name below to instantly join the chat room network.</p>
            <p id="error-message" class="error-text"></p>
            
            <form id="auth-form">
                <div class="input-group">
                    <input type="text" id="auth-name" placeholder="Choose a Display Name..." required autocomplete="off">
                </div>
                <button type="submit" id="submit-btn" class="btn-primary">Enter Chatroom</button>
            </form>
        </div>
    </div>

    <script type="module">
        import { initAuthPage } from "./app.js";
        initAuthPage();
    </script>
</body>
</html>
