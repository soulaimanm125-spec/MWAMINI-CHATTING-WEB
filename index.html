<script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signInAnonymously, sendEmailVerification, reload } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // Dynamic multi-environment Firebase configuration metrics
        const firebaseConfig = {
  apiKey: "AIzaSyBtDMYBR0jcyK-JfgsYtET1SenPngzmQi4",
  authDomain: "mwamini-chatting-web.firebaseapp.com",
  databaseURL: "https://mwamini-chatting-web-default-rtdb.firebaseio.com",
  projectId: "mwamini-chatting-web",
  storageBucket: "mwamini-chatting-web.firebasestorage.app",
  messagingSenderId: "640958885512",
  appId: "1:640958885512:web:2f9a636acc85534009b93d",
  measurementId: "G-SW9FBXX78G"
};

        // Core Initialization
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let isLoginMode = false; 

        // Target UI interactive DOM nodes
        const submitBtn = document.getElementById("auth-submit-btn");
        const switchLink = document.getElementById("auth-switch-link");
        const nameGroup = document.getElementById("name-group");
        const switchText = document.getElementById("auth-switch-text");
        const errorDisplay = document.getElementById("error-message");
        const guestBtn = document.getElementById("guest-login-btn");
        
        const formFieldsWrapper = document.getElementById("auth-form-fields");
        const verificationScreen = document.getElementById("verification-notice-screen");
        const checkVerificationBtn = document.getElementById("verification-check-btn");

        // Toggle form layouts between login and register views
        if (switchLink) {
            switchLink.addEventListener("click", () => {
                isLoginMode = !isLoginMode;
                errorDisplay.innerText = "";
                if (isLoginMode) {
                    submitBtn.innerText = "Login";
                    switchLink.innerText = "Register here";
                    switchText.innerText = "Don't have an account?";
                    if (nameGroup) nameGroup.style.display = "none";
                } else {
                    submitBtn.innerText = "Register";
                    switchLink.innerText = "Login here";
                    switchText.innerText = "Already have an account?";
                    if (nameGroup) nameGroup.style.display = "block";
                }
            });
        }

        // Processing regular authentication submission actions
        if (submitBtn) {
            submitBtn.addEventListener("click", async () => {
                const emailInput = document.getElementById("auth-email");
                const passwordInput = document.getElementById("auth-password");
                const nameInput = document.getElementById("auth-name");

                const email = emailInput ? emailInput.value.trim() : "";
                const password = passwordInput ? passwordInput.value.trim() : "";
                const name = nameInput ? nameInput.value.trim() : "";

                errorDisplay.innerText = "Processing workspace allocation...";
                errorDisplay.style.color = "#005c4b";

                if (!email || !password || (!isLoginMode && !name)) {
                    errorDisplay.innerText = "Please complete all fields humbly.";
                    errorDisplay.style.color = "#ea0038";
                    return;
                }

                try {
                    if (isLoginMode) {
                        const credential = await signInWithEmailAndPassword(auth, email, password);
                        
                        if (!credential.user.emailVerified) {
                            errorDisplay.innerText = "Please verify your email address to enter.";
                            errorDisplay.style.color = "#ea0038";
                            showVerificationInterface();
                            return;
                        }
                        
                        saveSessionAndRedirect(credential.user.uid, email.split("@")[0]);
                    } else {
                        const credential = await createUserWithEmailAndPassword(auth, email, password);
                        await sendEmailVerification(credential.user);
                        
                        await setDoc(doc(db, "users", credential.user.uid), {
                            uid: credential.user.uid,
                            name: name,
                            email: email,
                            status: "Humbled to join the community.",
                            accountMode: "standard",
                            isOnline: false
                        });

                        errorDisplay.innerText = "Verification message dispatched successfully.";
                        errorDisplay.style.color = "#005c4b";
                        showVerificationInterface();
                    }
                } catch (err) {
                    errorDisplay.innerText = err.message.replace("Firebase: ", "");
                    errorDisplay.style.color = "#ea0038";
                }
            });
        }

        if (checkVerificationBtn) {
            checkVerificationBtn.addEventListener("click", async () => {
                if (auth.currentUser) {
                    await reload(auth.currentUser);
                    if (auth.currentUser.emailVerified) {
                        saveSessionAndRedirect(auth.currentUser.uid, auth.currentUser.email.split("@")[0]);
                    } else {
                        errorDisplay.innerText = "Verification pending. Please check your inbox or spam folder.";
                        errorDisplay.style.color = "#ea0038";
                    }
                }
            });
        }

        // Instant Guest Access Entry Point Handling
        if (guestBtn) {
            guestBtn.addEventListener("click", async () => {
                errorDisplay.innerText = "Setting up attractive guest identity...";
                errorDisplay.style.color = "#005c4b";
                try {
                    const credential = await signInAnonymously(auth);
                    const guestUserTag = "GUEST_" + credential.user.uid.substring(0, 5).toUpperCase();
                    
                    await setDoc(doc(db, "users", credential.user.uid), {
                        uid: credential.user.uid,
                        name: guestUserTag,
                        email: "guest@mwamini.local",
                        status: "Exploring Mwamini space via temporary access.",
                        accountMode: "standard",
                        isOnline: true
                    });
                    saveSessionAndRedirect(credential.user.uid, guestUserTag);
                } catch (err) {
                    errorDisplay.innerText = "Guest entry restricted: " + err.message;
                    errorDisplay.style.color = "#ea0038";
                }
            });
        }

        function showVerificationInterface() {
            if (formFieldsWrapper) formFieldsWrapper.classList.add("hidden");
            if (verificationScreen) verificationScreen.classList.remove("hidden");
            const sep = document.getElementById("or-separator");
            if (sep) sep.classList.add("hidden");
            if (guestBtn) guestBtn.classList.add("hidden");
            const toggleCont = document.getElementById("toggle-container");
            if (toggleCont) toggleCont.classList.add("hidden");
        }

        function saveSessionAndRedirect(uid, displayName) {
            localStorage.setItem("session_uid", uid);
            localStorage.setItem("session_name", displayName);
            localStorage.setItem("session_account_mode", "standard");
            window.location.href = "dashboard.html";
        }
    </script>
