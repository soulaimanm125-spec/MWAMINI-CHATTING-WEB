<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MWAMINI CHAT WEB - Gateway</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>

    <div class="auth-container">
        <div class="auth-card">
            <h1 class="brand-title">MWAMINI CHAT WEB</h1>
            <p id="error-message" class="error-text"></p>
            
            <form id="auth-form">
                <div id="name-field-group" class="input-group">
                    <input type="text" id="auth-name" placeholder="Full Name (For Registration)" autocomplete="off">
                </div>
                <div class="input-group">
                    <input type="email" id="auth-email" placeholder="Email Address" required>
                </div>
                <div class="input-group">
                    <input type="password" id="auth-password" placeholder="Password" required>
                </div>
                <button type="submit" id="submit-btn" class="btn-primary">Login</button>
            </form>

            <p class="toggle-text" style="margin-top: 15px; font-size: 14px; color: #667781;">
                <span id="toggle-msg">Don't have an account?</span>
                <button id="toggle-auth-mode" class="btn-link" style="background: none; border: none; color: #00a884; font-weight: bold; cursor: pointer; text-decoration: underline;">Register here</button>
            </p>

            <div class="separator-line" style="margin: 20px 0; text-align: center; color: #8696a0; font-size: 13px;">─── OR ───</div>

            <button id="guest-mode-trigger-btn" class="btn-secondary-guest" style="width: 100%; padding: 11px; background: transparent; color: #00a884; border: 2px dashed #00a884; border-radius: 4px; font-weight: bold; cursor: pointer;">Enter via Guest Mode</button>
        </div>
    </div>

    <script type="module">
        import { initAuthPage } from "./app.js";
        initAuthPage();
    </script>
</body>
</html>
