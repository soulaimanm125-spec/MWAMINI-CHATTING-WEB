<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MWAMINI CHAT WEB</title>
    <link rel="stylesheet" href="./style.css"> 
</head>
<body>
    <div class="auth-container">
        <div class="auth-card" id="auth-card">
            <h2 id="auth-title" class="brand-title" style="text-align: center; color: #005c4b; font-weight: bold; margin-bottom: 10px;">MWAMINI CHAT WEB</h2>
            
            <div id="error-message" style="color: #ea0038; font-size: 13px; text-align: center; margin-bottom: 15px; font-weight: 500; min-height: 18px;"></div>

            <div class="input-group" id="name-group">
                <input type="text" id="auth-name" placeholder="Full Name (For Registration)" style="width: 100%; padding: 12px; margin-bottom: 12px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;">
            </div>
            <div class="input-group">
                <input type="email" id="auth-email" placeholder="Email Address" style="width: 100%; padding: 12px; margin-bottom: 12px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;">
            </div>
            <div class="input-group">
                <input type="password" id="auth-password" placeholder="Password" style="width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;">
            </div>

            <button type="button" id="auth-submit-btn" style="width: 100%; background: #005c4b; color: white; border: none; padding: 12px; font-size: 16px; font-weight: bold; border-radius: 4px; cursor: pointer; transition: 0.2s;">Register</button>

            <p style="margin-top: 20px; text-align: center; font-size: 14px; color: #667781;">
                <span id="auth-switch-text">Already have an account?</span> 
                <span id="auth-switch-link" style="color: #00a884; font-weight: bold; cursor: pointer; text-decoration: underline; margin-left: 5px;">Login here</span>
            </p>
            
            <div style="display: flex; align-items: center; text-align: center; margin: 20px 0; color: #8696a0; font-size: 12px;">
                <div style="flex: 1; border-bottom: 1px solid #e9edef;"></div>
                <span style="padding: 0 10px;">OR</span>
                <div style="flex: 1; border-bottom: 1px solid #e9edef;"></div>
            </div>

            <button type="button" id="guest-login-btn" style="width: 100%; background: transparent; color: #005c4b; border: 2px dashed #005c4b; padding: 10px; font-size: 14px; font-weight: bold; border-radius: 4px; cursor: pointer;">Enter via Guest Mode</button>
        </div>
    </div>

    <script type="module">
        import { initAuthGateway } from "./auth.js";
        document.addEventListener("DOMContentLoaded", () => {
            initAuthGateway();
        });
    </script>
</body>
</html>
