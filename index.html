<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MWAMINI CHAT WEB</title>
    <link rel="stylesheet" href="./style.css">
    <style>
        .auth-container { display: flex; justify-content: center; align-items: center; min-height: 100vh; background-color: #f0f2f5; font-family: sans-serif; }
        .auth-card { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 400px; box-sizing: border-box; }
        .input-group input { width: 100%; padding: 12px; margin-bottom: 12px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-size: 14px; }
        .btn-primary { width: 100%; background: #005c4b; color: white; border: none; padding: 12px; font-size: 16px; font-weight: bold; border-radius: 5px; cursor: pointer; }
        .btn-secondary-guest { width: 100%; background: transparent; color: #005c4b; border: 2px dashed #005c4b; padding: 10px; font-size: 14px; font-weight: bold; border-radius: 5px; cursor: pointer; margin-top: 10px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="auth-card">
            <h2 id="auth-title" style="text-align: center; color: #005c4b; font-weight: bold; margin-bottom: 5px;">MWAMINI CHAT WEB</h2>
            
            <p id="error-message" style="color: #ea0038; font-size: 13px; font-weight: bold; text-align: center; margin-bottom: 15px; min-height: 18px;"></p>

            <div id="auth-form-fields">
                <div class="input-group" id="name-group">
                    <input type="text" id="auth-name" placeholder="Full Name (For Registration)">
                </div>
                <div class="input-group">
                    <input type="email" id="auth-email" placeholder="Email Address">
                </div>
                <div class="input-group">
                    <input type="password" id="auth-password" placeholder="Password">
                </div>
                
                <div id="forgot-password-container" class="hidden" style="text-align: right; margin-top: -6px; margin-bottom: 15px;">
                    <span id="auth-forgot-link" style="color: #667781; font-size: 13px; cursor: pointer; text-decoration: underline;">Forgot Password?</span>
                </div>

                <button type="button" id="auth-submit-btn" class="btn-primary">Register</button>
            </div>

            <div id="verification-notice-screen" class="hidden" style="text-align: center;">
                <div style="font-size: 48px; margin-bottom: 10px;">✉️</div>
                <h3 style="color: #005c4b; margin-bottom: 10px;">Verify Your Email</h3>
                <p style="font-size: 13px; color: #667781; line-height: 1.5; margin-bottom: 20px;">
                    An activation confirmation email link has been sent to your inbox. Complete registration automatically by opening the link.
                </p>
                <button type="button" id="verification-check-btn" class="btn-primary" style="background: #00a884;">I Have Verified My Email</button>
            </div>

            <p id="toggle-container" style="margin-top: 20px; text-align: center; font-size: 14px; color: #667781;">
                <span id="auth-switch-text">Already have an account?</span> 
                <span id="auth-switch-link" style="color: #00a884; font-weight: bold; cursor: pointer; text-decoration: underline; margin-left: 5px;">Login here</span>
            </p>
            
            <div id="or-separator" style="display: flex; align-items: center; text-align: center; margin: 20px 0; color: #8696a0; font-size: 12px;">
                <div style="flex: 1; border-bottom: 1px solid #e9edef;"></div>
                <span style="padding: 0 10px;">OR</span>
                <div style="flex: 1; border-bottom: 1px solid #e9edef;"></div>
            </div>
            
            <button type="button" id="guest-login-btn" class="btn-secondary-guest">Enter via Guest Mode</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signInAnonymously, sendEmailVerification, sendPasswordResetEmail, reload } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyBtDMYBR0jcyK-JfgsYtET1SenPngzmQi4",
          authDomain: "mwamini-chatting-web.firebaseapp.com",
          projectId: "mwamini-chatting-web",
          storageBucket: "mwamini-chatting-web.firebasestorage.app",
          messagingSenderId: "640958885512",
          appId: "1:640958885512:web:2f9a636acc85534009b93d"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let isLoginMode = false; 

        const submitBtn = document.getElementById("auth-submit-btn");
        const switchLink = document.getElementById("auth-switch-link");
        const nameGroup = document.getElementById("name-group");
        const switchText = document.getElementById("auth-switch-text");
        const errorDisplay = document.getElementById("error-message");
        const guestBtn = document.getElementById("guest-login-btn");
        const forgotPasswordContainer = document.getElementById("forgot-password-container");
        const forgotPasswordLink = document.getElementById("auth-forgot-link");
        
        const formFieldsWrapper = document.getElementById("auth-form-fields");
        const verificationScreen = document.getElementById("verification-notice-screen");
        const checkVerificationBtn = document.getElementById("verification-check-btn");

        if (switchLink) {
            switchLink.addEventListener("click", () => {
                isLoginMode = !isLoginMode;
                errorDisplay.innerText = "";
                if (isLoginMode) {
                    submitBtn.innerText = "Login";
                    switchLink.innerText = "Register here";
                    switchText.innerText = "Don't have an account?";
                    if (nameGroup) nameGroup.style.display = "none";
                    if (forgotPasswordContainer) forgotPasswordContainer.classList.remove("hidden");
                } else {
                    submitBtn.innerText = "Register";
                    switchLink.innerText = "Login here";
                    switchText.innerText = "Already have an account?";
                    if (nameGroup) nameGroup.style.display = "block";
                    if (forgotPasswordContainer) forgotPasswordContainer.classList.add("hidden");
                }
            });
        }

        // --- UPGRADED: PASSWORD RESET LOGIC ---
        if (forgotPasswordLink) {
            forgotPasswordLink.addEventListener("click", async () => {
                const emailInput = document.getElementById("auth-email");
                const email = emailInput ? emailInput.value.trim() : "";

                if (!email) {
                    errorDisplay.innerText = "Please input your email address first to request a reset link.";
                    errorDisplay.style.color = "#ea0038";
                    return;
                }

                errorDisplay.innerText = "Sending recovery link to your inbox...";
                errorDisplay.style.color = "#005c4b";

                try {
                    await sendPasswordResetEmail(auth, email);
                    errorDisplay.innerText = "A password recovery link has been safely transmitted to your email address.";
                    errorDisplay.style.color = "#00a884";
                } catch (err) {
                    errorDisplay.innerText = err.message.replace("Firebase: ", "");
                    errorDisplay.style.color = "#ea0038";
                }
            });
        }

        if (submitBtn) {
            submitBtn.addEventListener("click", async () => {
                const email = document.getElementById("auth-email").value.trim();
                const password = document.getElementById("auth-password").value.trim();
                const name = document.getElementById("auth-name") ? document.getElementById("auth-name").value.trim() : "";

                errorDisplay.innerText = "Processing configuration setup...";
                errorDisplay.style.color = "#005c4b";

                if (!email || !password || (!isLoginMode && !name)) {
                    errorDisplay.innerText = "Please complete all fields humbly.";
                    errorDisplay.style.color = "#ea0038";
                    return;
                }

                try {
                    if (isLoginMode) {
                        const credential = await signInWithEmailAndPassword(auth, email, password);
                        
                        if (!credential.user.emailVerified) {
                            errorDisplay.innerText = "Please verify your email address to log in.";
                            errorDisplay.style.color = "#ea0038";
                            showVerificationInterface();
                            return;
                        }
                        
                        saveSessionAndRedirect(credential.user.uid, email.split("@")[0]);
                    } else {
