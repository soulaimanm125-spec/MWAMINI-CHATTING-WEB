<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MWAMINI CHAT WEB - Authentication</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h1 class="brand-title">MWAMINI CHAT WEB</h1>
            <p id="error-message" class="error-text"></p>
            
            <form id="auth-form">
                <div id="name-field-group" class="input-group">
                    <input type="text" id="auth-name" placeholder="Full Name / Display Name" autocomplete="off">
                </div>
                <div id="email-field-group" class="input-group hidden">
                    <input type="email" id="auth-email" placeholder="Email Address">
                </div>
                <div id="pass-field-group" class="input-group hidden">
                    <input type="password" id="auth-password" placeholder="Password">
                </div>
                <button type="submit" id="submit-btn" class="btn-primary">Join as Guest</button>
            </form>

            <p class="toggle-text">
                <span id="toggle-msg">Want a permanent profile?</span>
                <button id="toggle-auth-mode" class="btn-link">Register here</button> or
                <button id="guest-mode-btn" class="btn-link">Use Guest Mode</button>
            </p>
        </div>
    </div>

    <script type="module">
        import { initAuthPage } from "./app.js";
        initAuthPage();
    </script>
</body>
</html>
