<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MWAMINI CHAT WEB</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="app-window">
        <aside class="sidebar">
            <header class="sidebar-header">
                <div class="user-profile">
                    <span id="current-user-title">Loading Profile...</span>
                </div>
                <button id="logout-btn" class="btn-logout">Logout</button>
            </header>
            <div class="search-box">
                <input type="text" id="search-users" placeholder="Search or start new chat">
            </div>
            <div class="user-list" id="users-container"></div>
        </aside>

        <main class="chat-panel">
            <div id="no-chat-selected" class="welcome-screen">
                <div class="welcome-banner">🌐</div>
                <h2>MWAMINI CHAT WEB</h2>
                <p>Send secure files and real-time text streams across an end-to-end controlled dashboard.</p>
            </div>

            <div id="active-chat-area" class="chat-area hidden">
                <header class="chat-header">
                    <h3 id="chat-header-name">Active User</h3>
                    <span class="online-status">secure session channel</span>
                </header>
                
                <div class="message-stream" id="message-stream"></div>
                
                <footer class="chat-input-bar">
                    <input type="file" id="file-input" class="hidden">
                    <label for="file-input" class="file-attach-btn">📎</label>

                    <form id="message-form">
                        <input type="text" id="message-input" placeholder="Type a message" autocomplete="off">
                        <button type="submit" class="btn-send">Send</button>
                    </form>
                </footer>
            </div>
        </main>
    </div>

    <script type="module">
        import { initDashboardPage } from "./app.js";
        initDashboardPage();
    </script>
</body>
</html>
