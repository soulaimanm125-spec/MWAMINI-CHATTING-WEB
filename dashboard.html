<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MWAMINI CHAT WEB - Dashboard</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body { background-color: #eae6df; height: 100vh; display: flex; padding: 20px; }
        .app-window { display: flex; width: 100%; max-width: 1396px; height: 100%; margin: 0 auto; background-color: #ffffff; box-shadow: 0 6px 18px rgba(0,0,0,0.06); border-radius: 4px; overflow: hidden; }
        .sidebar { width: 30%; min-width: 340px; max-width: 440px; height: 100%; border-right: 1px solid #e9edef; display: flex; flex-direction: column; background: #ffffff; }
        .sidebar-header { height: 60px; background: #f0f2f5; display: flex; align-items: center; justify-content: space-between; padding: 10px 16px; }
        .user-profile h3 { font-size: 15px; color: #111b21; font-weight: bold; }
        .btn-logout { background: #ea0038; color: white; border: none; padding: 6px 12px; font-size: 12px; font-weight: bold; border-radius: 4px; cursor: pointer; }
        .search-box { padding: 8px 14px; background: #ffffff; border-bottom: 1px solid #f0f2f5; }
        .search-box input { width: 100%; padding: 8px 12px; background: #f0f2f5; border: none; border-radius: 8px; font-size: 14px; outline: none; }
        .user-list { flex: 1; overflow-y: auto; }
        .chat-panel { flex: 1; height: 100%; display: flex; flex-direction: column; background: #efeae2; position: relative; }
        .welcome-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; text-align: center; padding: 30px; background: #f8f9fa; z-index: 2; }
        .chat-area { display: flex; flex-direction: column; height: 100%; z-index: 2; }
        .hidden { display: none !important; }
        
        /* Badges & Indicators */
        .status-badge { font-size: 11px; font-weight: bold; padding: 2px 6px; border-radius: 10px; margin-left: 5px; text-transform: uppercase; }
        .status-online { background: #e8f5e9; color: #2e7d32; }
        .status-offline { background: #efebe9; color: #4e342e; }
        .group-badge-public { background: #e3f2fd; color: #0d47a1; font-size: 10px; font-weight: bold; padding: 2px 6px; border-radius: 10px; text-transform: uppercase; }
        .group-badge-protected { background: #fff3e0; color: #e65100; font-size: 10px; font-weight: bold; padding: 2px 6px; border-radius: 10px; text-transform: uppercase; }
        .unread-indicator { background: #00a884; color: white; border-radius: 50%; padding: 2px 7px; font-size: 11px; font-weight: bold; float: right; animation: pulse 1.5s infinite; }
        
        /* Group UI */
        .group-creation-box { padding: 12px 16px; background: #f0f2f5; border-bottom: 1px solid #e9edef; display: flex; flex-direction: column; gap: 6px; }
        .group-creation-box input, .group-creation-box select { padding: 6px; border: 1px solid #ccc; border-radius: 4px; font-size: 12px; outline: none; }
        .btn-group-create { background: #005c4b; color: white; border: none; padding: 6px; font-size: 12px; font-weight: bold; border-radius: 4px; cursor: pointer; }
        
        /* Permanent Discovery Section */
        .discovery-section-title { font-size: 11px; font-weight: bold; color: #005c4b; padding: 10px 16px 5px 16px; background: #ffffff; letter-spacing: 0.5px; }
        .groups-discovery-container { background: #ffffff; border-bottom: 2px dashed #e9edef; max-height: 180px; overflow-y: auto; }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>
    <div class="app-window">
        <aside class="sidebar">
            <header class="sidebar-header">
                <div class="user-profile">
                    <div>
                        <h3 id="current-user-title">MWAMINI</h3>
                        <p id="my-status-display" style="font-size: 11px; color: #667781; font-style: italic;">Online</p>
                    </div>
                </div>
                <button id="logout-btn" class="btn-logout">Leave Chat</button>
            </header>

            <div class="status-updater-tray" style="display: flex; flex-direction: column; gap: 5px; padding: 12px 16px; background: #f0f2f5; border-bottom: 1px solid #e9edef;">
                <label style="font-size: 11px; font-weight: bold; color: #005c4b;">UPDATE MWAMINI STATUS</label>
                <div style="display: flex; gap: 5px; width: 100%; align-items: center;">
                    <input type="text" id="status-input" placeholder="Share your thoughts..." style="flex: 1; padding: 8px; border: 1px solid #ccc; border-radius: 4px; outline: none; font-size: 13px;">
                    <input type="file" id="status-media-file" style="display: none;" accept="image/*,video/*">
                    <label for="status-media-file" style="cursor: pointer; font-size: 18px; padding: 0 4px;" title="Attach Image/Video Story">🖼️</label>
                    <button id="update-status-btn" style="background: #008069; color: white; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: bold;">Post</button>
                </div>
                <div id="active-statuses-view" style="display: flex; gap: 8px; overflow-x: auto; margin-top: 5px; padding: 4px 0;"></div>
            </div>

            <div class="group-creation-box">
                <label style="font-size: 11px; font-weight: bold; color: #005c4b;">CREATE SECURE CHAT GROUP</label>
                <input type="text" id="group-name-input" placeholder="Group Name">
                <select id="group-type-select">
                    <option value="public">Public Group (No Password)</option>
                    <option value="protected">Protected Group (Requires Password)</option>
                </select>
                <input type="password" id="group-password-input" placeholder="Set Group Password (If Protected)" class="hidden">
                <button id="create-group-btn" class="btn-group-create">Build Room</button>
            </div>

            <div class="discovery-section-title">GLOBAL DISCOVERY GROUPS (PERMANENT)</div>
            <div class="groups-discovery-container" id="global-groups-discovery">
                </div>

            <div class="search-box">
                <label style="font-size: 11px; font-weight: bold; color: #005c4b; display: block; margin-bottom: 4px;">FIND VERIFIED USERS</label>
                <input type="text" id="search-users" placeholder="Search a user's full name...">
            </div>
            
            <div class="user-list" id="users-container"></div>
        </aside>

        <main class="chat-panel" id="chat-panel-view">
            <div id="no-chat-selected" class="welcome-screen">
                <div style="font-size: 64px; margin-bottom: 15px;">✨</div>
                <h2 style="color: #005c4b; font-size: 28px; font-weight: 700; margin-bottom: 8px;">Welcome to Mwamini Chat Web</h2>
                <p style="color: #667781; font-size: 15px; max-width: 440px; line-height: 1.6; margin: 0 auto;">
                    Select an open global room or query a verified connection profile to establish an encrypted workspace stream.
                </p>
            </div>

            <div id="active-chat-area" class="chat-area hidden">
                <header class="chat-header" style="display: flex; justify-content: space-between; align-items: center; padding: 10px 16px; background: #f0f2f5; border-bottom: 1px solid #e9edef; height: 60px;">
                    <div>
                        <div style="display: flex; align-items: center; gap: 5px;">
                            <h3 id="chat-header-name" style="margin: 0; color: #111b21; font-size: 15px; font-weight: bold;">Target Session</h3>
                            <span id="chat-header-presence-badge"></span>
                        </div>
                        <span id="chat-header-status-text" style="font-size: 12px; color: #667781;">secure connection online</span>
                    </div>
                    
                    <div style="display: flex; gap: 15px; font-size: 18px; align-items: center;">
                        <select id="background-changer" style="font-size: 12px; padding: 4px; border-radius: 4px; border: 1px solid #ccc; background: white; outline: none; cursor: pointer;" title="Modify Room Theme">
                            <option value="#efeae2">🎨 Classic Tan</option>
                            <option value="#e3f2fd">🎨 Soft Sky Blue</option>
                            <option value="#f1f8e9">🎨 Sage Green</option>
                            <option value="#fce4ec">🎨 Lavender Pink</option>
                            <option value="#263238">🎨 Dark Night Mode</option>
                        </select>
                        <span id="trigger-voice-call" style="cursor: pointer;" title="Voice Call">📞</span>
                        <span id="trigger-video-call" style="cursor: pointer;" title="Video Call">📹</span>
                    </div>
                </header>
                
                <div class="message-stream" id="message-stream" style="flex:1; overflow-y:auto; padding:20px; background-color:#efeae2; transition: background 0.3s;"></div>
                
                <footer class="chat-input-bar" style="padding: 10px; background: #f0f2f5; display: flex; align-items: center; gap: 10px;">
                    <button type="button" id="voice-record-btn" title="Record Voice Chat" style="background: transparent; border: none; font-size: 20px; cursor: pointer;">🎤</button>
                    <span id="voice-recording-status" class="hidden" style="color: #ea0038; font-size: 11px; font-weight: bold;">● RECORDING</span>

                    <form id="message-form" style="display: flex; flex: 1; gap: 10px; align-items: center; margin: 0;">
                        <input type="text" id="message-input" placeholder="Write a secure message..." autocomplete="off" style="flex:1; padding:11px 14px; border-radius:6px; border:1px solid #ccc; outline:none; font-size:14px;">
                        <button type="submit" style="padding:10px 18px; background:#005c4b; color:white; border:none; border-radius:6px; font-weight:bold; cursor:pointer; font-size:14px;">Send</button>
                    </form>
                </footer>
            </div>
        </main>
    </div>

    <script type="module" src="./app.js"></script>
</body>
</html>
