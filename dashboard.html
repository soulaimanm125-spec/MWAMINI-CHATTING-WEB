<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MWAMINI CHAT WEB</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="app-window">
        <aside class="sidebar">
            <header class="sidebar-header">
                <div class="user-profile" id="open-settings-drawer-zone" title="Click to open Profile Settings">
                    <div class="header-avatar-frame" id="my-global-avatar-preview">M</div>
                    <div class="profile-meta-text">
                        <h3 id="current-user-title">Loading...</h3>
                        <p id="my-status-display" class="my-current-status-tag">Status loading...</p>
                    </div>
                </div>
                <button id="logout-btn" class="btn-logout">Leave Chat</button>
            </header>

            <div class="search-box">
                <input type="text" id="search-users" placeholder="Search isolated safe channel...">
            </div>
            <div class="user-list" id="users-container"></div>
        </aside>

        <main class="chat-panel">
            <div id="no-chat-selected" class="welcome-screen">
                <div class="welcome-banner">🌐</div>
                <h2>MWAMINI CHAT WEB</h2>
                <p>Send secure files and real-time text streams across an isolated private channel network.</p>
            </div>

            <div id="active-chat-area" class="chat-area hidden">
                <header class="chat-header">
                    <div class="chat-header-profile-row">
                        <div class="wa-avatar" id="active-chat-header-avatar">C</div>
                        <div class="active-user-meta-header">
                            <h3 id="chat-header-name">Active User</h3>
                            <span class="online-status">secure isolated channel session</span>
                        </div>
                    </div>
                </header>
                
                <div class="message-stream" id="message-stream"></div>
                
                <footer class="chat-input-bar">
                    <input type="file" id="file-input" class="hidden" accept="image/*,video/*,audio/*,.pdf,.doc,.docx,.xls,.xlsx,.txt">
                    <label for="file-input" class="file-attach-btn" title="Attach Media File">📎</label>

                    <form id="message-form">
                        <input type="text" id="message-input" placeholder="Type a message" autocomplete="off">
                        <button type="submit" class="btn-send">Send</button>
                    </form>
                </footer>
            </div>
        </main>

        <div id="settings-drawer-overlay" class="drawer-overlay hidden">
            <div class="drawer-body">
                <div class="drawer-header">
                    <button id="close-drawer-btn" class="btn-close-drawer">←</button>
                    <h3>Profile Settings</h3>
                </div>
                <div class="drawer-content-scroll">
                    <div class="drawer-section">
                        <label class="section-title">Profile Picture</label>
                        <div class="avatar-edit-cluster">
                            <div class="large-avatar-preview" id="drawer-avatar-preview-circle">M</div>
                            <input type="file" id="avatar-image-upload" class="hidden" accept="image/*">
                            <label for="avatar-image-upload" class="btn-secondary-action">Upload New Photo</label>
                        </div>
                    </div>
                    <div class="drawer-section">
                        <label class="section-title" for="status-input">Your Status Text</label>
                        <div class="status-updater-tray">
                            <input type="text" id="status-input" placeholder="Update your WhatsApp bio...">
                            <button id="update-status-btn">Save</button>
                        </div>
                    </div>
                    <div class="drawer-section">
                        <label class="section-title">Chat Wall Background Style</label>
                        <div class="wallpaper-grid-selectors">
                            <button class="wp-selector" data-color="#efeae2" style="background-color: #efeae2; border: 1px solid #ccc;" title="Default Sand"></button>
                            <button class="wp-selector" data-color="#d8efdf" style="background-color: #d8efdf;" title="Mint Green"></button>
                            <button class="wp-selector" data-color="#d3e3fc" style="background-color: #d3e3fc;" title="Soft Azure"></button>
                            <button class="wp-selector" data-color="#fce4ec" style="background-color: #fce4ec;" title="Blush Rose"></button>
                            <button class="wp-selector" data-color="#111b21" style="background-color: #111b21;" title="Midnight Dark"></button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initDashboardPage } from "./app.js";
        initDashboardPage();
    </script>
</body>
</html>
