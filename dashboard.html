<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MWAMINI CHAT WEB</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="app-window">
        <aside class="sidebar">
            <header class="sidebar-header">
                <div class="user-profile">
                    <div class="avatar-setting-wrapper">
                        <img id="my-profile-preview" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23667781'><path d='M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5-4-8-4z'/></svg>" class="current-user-avatar">
                        <input type="file" id="avatar-upload-input" accept="image/*" class="hidden">
                        <label for="avatar-upload-input" class="avatar-edit-overlay">📸</label>
                    </div>
                    <div>
                        <h3 id="current-user-title">Loading...</h3>
                        <p id="my-status-display" class="my-current-status-tag"></p>
                    </div>
                </div>
                <button id="logout-btn" class="btn-logout">Exit Session</button>
            </header>

            <div class="customization-bar">
                <label for="bg-color-picker" class="tool-label">Wallpaper Background:</label>
                <input type="color" id="bg-color-picker" value="#efeae2">
            </div>

            <div class="search-box">
                <input type="text" id="search-users" placeholder="Search or start new chat">
            </div>
            <div class="user-list" id="users-container"></div>
        </aside>

        <main class="chat-panel">
            <div id="no-chat-selected" class="welcome-screen">
                <div class="welcome-banner">🌐</div>
                <h2>MWAMINI CHAT WEB</h2>
                <p>Send secure files, update your custom statuses, or modify your wallpaper settings seamlessly.</p>
            </div>

            <div id="active-chat-area" class="chat-area hidden">
                <div class="status-updater-tray">
                    <input type="text" id="status-input" placeholder="Update your public status bio...">
                    <button id="update-status-btn">Save Status</button>
                </div>

                <header class="chat-header">
                    <h3 id="chat-header-name">Active User</h3>
                    <span class="online-status">secure isolated channel</span>
                </header>
                
                <div class="message-stream" id="message-stream"></div>
                
                <footer class="chat-input-bar">
                    <input type="file" id="file-input" class="hidden" accept="image/*,video/*,audio/*,.pdf,.doc,.docx,.xls,.xlsx,.txt">
                    <label for="file-input" class="file-attach-btn" title="Attach Media File">📎</label>

                    <form id="message-form">
                        <input type="text" id="message-input" placeholder="Type a message" autocomplete="off">
                        <button type="submit" class="btn-send">Send</button>
                    </form>
                </footer>
            </div>
        </main>
    </div>

    <script type="module">
        import { initDashboardPage } from "./app.js";
        initDashboardPage();
    </script>
</body>
</html>
