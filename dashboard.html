<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MWAMINI CHAT WEB - Dashboard</title>
    <link rel="stylesheet" href="./style.css">
    <style>.hidden { display: none !important; }</style>
</head>
<body>
    <div class="app-window">
        <aside class="sidebar">
            <header class="sidebar-header">
                <div class="user-profile">
                    <div>
                        <h3 id="current-user-title">MWAMINI</h3>
                        <p id="my-status-display" style="font-size: 11px; color: #667781; font-style: italic;">Online</p>
                    </div>
                </div>
                <button id="logout-btn" class="btn-logout">Leave Chat</button>
            </header>

            <div class="status-updater-tray" style="display: flex; flex-direction: column; gap: 5px; padding: 12px 16px; background: #f0f2f5;">
                <label style="font-size: 12px; font-weight: bold; color: #005c4b; margin-bottom: 2px;">UPDATE MWAMINI STATUS</label>
                <div style="display: flex; gap: 5px; width: 100%; align-items: center;">
                    <input type="text" id="status-input" placeholder="Share your thoughts..." style="flex: 1; padding: 8px; border: 1px solid #ccc; border-radius: 4px;">
                    
                    <input type="file" id="status-media-file" style="display: none;" accept="image/*,video/*">
                    <label for="status-media-file" style="cursor: pointer; font-size: 18px; padding: 0 4px;" title="Attach Image/Video Story">🖼️</label>
                    
                    <button id="update-status-btn" style="background: #008069; color: white; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: bold;">Post</button>
                </div>
                <div id="active-statuses-view" style="display: flex; gap: 8px; overflow-x: auto; margin-top: 5px; padding: 4px 0;"></div>
            </div>

            <div class="search-box">
                <input type="text" id="search-users" placeholder="Search verified account name...">
            </div>
            
            <div class="user-list" id="users-container"></div>
        </aside>

        <main class="chat-panel">
            <div id="no-chat-selected" class="welcome-screen" style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; text-align: center; padding: 30px; background: #f8f9fa;">
                <div style="font-size: 64px; margin-bottom: 15px;">✨</div>
                <h2 style="color: #005c4b; font-size: 28px; font-weight: 700; margin-bottom: 8px;">Welcome to Mwamini Chat Web</h2>
                <p style="color: #667781; font-size: 15px; max-width: 440px; line-height: 1.6; margin: 0 auto;">
                    We are truly humbled to have you here. Connect instantly across our secure private workspace network. Select a connection thread from the search panel to begin your conversation.
                </p>
            </div>

            <div id="active-chat-area" class="chat-area hidden">
                <header class="chat-header" style="display: flex; justify-content: space-between; align-items: center; padding: 10px 16px; background: #f0f2f5;">
                    <div>
                        <h3 id="chat-header-name" style="margin: 0; color: #111b21;">Target Session</h3>
                        <span id="chat-header-status-text" style="font-size: 12px; color: #667781;">secure connection online</span>
                    </div>
                    
                    <div style="display: flex; gap: 18px; font-size: 20px; align-items: center; padding-right: 10px;">
                        <span id="trigger-voice-call" style="cursor: pointer;" title="Voice Call">📞</span>
                        <span id="trigger-video-call" style="cursor: pointer;" title="Video Call">📹</span>
                    </div>
                </header>
                
                <div class="message-stream" id="message-stream" style="flex:1; overflow-y:auto; padding:20px;"></div>
                
                <footer class="chat-input-bar" style="padding: 10px; background: #f0f2f5; display: flex; align-items: center; gap: 10px;">
                    <button type="button" id="voice-record-btn" title="Record Voice Chat" style="background: transparent; border: none; font-size: 20px; cursor: pointer;">🎤</button>
                    <span id="voice-recording-status" class="hidden" style="color: #ea0038; font-size: 11px; font-weight: bold;">● RECORDING</span>

                    <form id="message-form" style="display: flex; flex: 1; gap: 10px; align-items: center; margin: 0;">
                        <input type="text" id="message-input" placeholder="Write a secure message..." autocomplete="off" style="flex:1; padding:10px; border-radius:4px; border:1px solid #ccc;">
                        <button type="submit" class="btn-send" style="padding:10px 15px; background:#005c4b; color:white; border:none; border-radius:4px; cursor:pointer;">Send</button>
                    </form>
                </footer>
            </div>
        </main>
    </div>

    <script type="module" src="./app.js"></script>
</body>
</html>
