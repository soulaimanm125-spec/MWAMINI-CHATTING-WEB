<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MWAMINI CHAT WEB</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="app-window">
        <aside class="sidebar">
            <header class="sidebar-header">
                <div class="user-profile">
                    <div id="my-profile-pic-container" style="cursor: pointer; position: relative; margin-right: 5px;">
                        <div class="wa-avatar" id="my-global-avatar-preview">M</div>
                        <input type="file" id="avatar-image-upload" style="display: none;" accept="image/*">
                    </div>
                    <div>
                        <h3 id="current-user-title">MWAMINI</h3>
                        <p id="my-status-display" style="font-size: 12px; color: #667781; font-style: italic;">HI</p>
                    </div>
                </div>
                <div style="display: flex; gap: 5px; align-items: center;">
                    <button id="create-group-btn" class="btn-group-action" style="background: #008069; color: white; border: none; padding: 6px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: bold;">+ Group</button>
                    <button id="logout-btn" class="btn-logout">Leave Chat</button>
                </div>
            </header>

            <div class="status-updater-tray">
                <input type="text" id="status-input" placeholder="Update your WhatsApp status...">
                <button id="update-status-btn">Save</button>
            </div>

            <div class="search-box" style="display: flex; gap: 8px; align-items: center;">
                <input type="text" id="search-users" placeholder="Type exact username to find user...">
                <input type="color" id="bg-color-picker" value="#efeae2" title="Change Chat Background" style="width: 35px; height: 35px; padding: 0; border: none; border-radius: 50%; cursor: pointer;">
            </div>
            
            <div class="user-list" id="users-container"></div>
        </aside>

        <main class="chat-panel">
            <div id="no-chat-selected" class="welcome-screen">
                <div class="welcome-banner">🌐</div>
                <h2>MWAMINI CHAT WEB</h2>
                <p>Send secure files, voice recordings, and real-time text streams across an end-to-end controlled dashboard.</p>
            </div>

            <div id="active-chat-area" class="chat-area hidden">
                <header class="chat-header">
                    <h3 id="chat-header-name">MURIGO</h3>
                    <span class="online-status">secure session channel</span>
                </header>
                
                <div class="message-stream" id="message-stream"></div>
                
                <footer class="chat-input-bar">
                    <input type="file" id="file-input" style="display: none;">
                    <label for="file-input" class="file-attach-btn" title="Attach Media File" id="file-attachment-label" style="cursor: pointer; font-size: 24px; padding: 0 4px;">📎</label>

                    <button type="button" id="voice-record-btn" title="Hold to record or tap to toggle" style="background: transparent; border: none; font-size: 22px; cursor: pointer; padding: 0 5px;">🎤</button>
                    <span id="voice-recording-status" class="hidden" style="color: red; font-size: 13px; font-weight: bold; animation: blink 1s infinite;">● REC 0:00</span>

                    <form id="message-form" style="display: flex; flex: 1; gap: 10px; align-items: center;">
                        <input type="text" id="message-input" placeholder="Type a message" autocomplete="off">
                        <button type="submit" class="btn-send">Send</button>
                    </form>
                </footer>
            </div>
        </main>
    </div>

    <script type="module">
        import { initDashboardPage } from "./app.js";
        initDashboardPage();
    </script>
</body>
</html>
